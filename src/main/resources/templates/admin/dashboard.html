<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<h1>Admin Dashboard</h1>

<div class="grid">
    <div class="card">
        <h2>Total Users</h2>
        <p th:text="${users}"></p>
    </div>

    <div class="card">
        <h2>Total Orders</h2>
        <p th:text="${orders}"></p>
    </div>

    <div class="card">
        <h2>Total Revenue</h2>
        <p>₹ <span th:text="${revenue}"></span></p>
    </div>
</div>

<a href="/admin/products" class="btn">Manage Products</a>

</body>
</html>
