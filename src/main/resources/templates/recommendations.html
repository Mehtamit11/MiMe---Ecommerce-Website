<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Recommended</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<h2>Recommended For You</h2>

<div class="grid">
    <div class="card" th:each="p : ${products}">
        <img th:src="${p.imageUrl}" />
        <h3 th:text="${p.name}"></h3>
        <p th:text="${p.price}"></p>
    </div>
</div>

</body>
</html>
